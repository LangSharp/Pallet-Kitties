<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="CatFi - The purrfect NFT Marketplace on Avalanche Blockchain" />
    <meta property="og:title" content="CatFi - NFT Marketplace" />
    <meta property="og:description" content="Trade adorable cat NFTs on the fastest blockchain" />
    <meta property="og:type" content="website" />
    <title>CatFi | NFT Marketplace on Avalanche</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      :root {
        --primary: #ff2d75;
        --primary-glow: rgba(255, 45, 117, 0.4);
        --secondary: #00f0ff;
        --secondary-glow: rgba(0, 240, 255, 0.4);
        --accent: #ffd700;
        --bg-dark: #0a0a0f;
        --bg-card: rgba(20, 20, 30, 0.8);
        --text-primary: #ffffff;
        --text-secondary: #a0a0b0;
      }
      
      body {
        font-family: 'Space Grotesk', sans-serif;
        background: var(--bg-dark);
        color: var(--text-primary);
        overflow-x: hidden;
      }
      
      #root { min-height: 100vh; }
      
      .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          radial-gradient(ellipse at 20% 20%, rgba(255, 45, 117, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
        animation: bgPulse 10s ease-in-out infinite;
      }
      
      @keyframes bgPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      
      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }
      
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: var(--secondary);
        border-radius: 50%;
        animation: float 15s infinite;
        opacity: 0.6;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
